name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  workflow-lint:
    name: workflow-lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install actionlint
        run: |
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          sudo mv ./actionlint /usr/local/bin/actionlint

      - name: Validate workflow
        run: actionlint -color

  unit-tests:
    name: unit-tests (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: workflow-lint
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  api-tests:
    name: api-tests (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: workflow-lint
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Run API tests
        run: npm run test:api

  ui-tests:
    name: ui-tests (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: workflow-lint
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Install Playwright (Linux)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps

      - name: Install Playwright (macOS/Windows)
        if: runner.os != 'Linux'
        run: npx playwright install

      - name: Run UI tests
        run: npm run test:ui

  notify:
    name: notify
    needs: [unit-tests, api-tests, ui-tests]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Build status
        id: status
        run: |
          if [ "${{ needs['unit-tests'].result }}" = "success" ] && \
             [ "${{ needs['api-tests'].result }}" = "success" ] && \
             [ "${{ needs['ui-tests'].result }}" = "success" ]; then
            echo "msg=✅ All tests passed" >> $GITHUB_OUTPUT
          else
            echo "msg=❌ Some tests failed" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "No telegram secrets"
            exit 0
          fi

          MESSAGE=$(cat <<EOF
          ${{ steps.status.outputs.msg }}
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="$MESSAGE"